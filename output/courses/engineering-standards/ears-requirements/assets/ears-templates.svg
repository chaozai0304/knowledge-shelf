<svg xmlns="http://www.w3.org/2000/svg" width="960" height="760" viewBox="0 0 960 760">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F5F7FF"/></linearGradient><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5DB2E2"/><stop offset="1" stop-color="#625D9C"/></linearGradient><filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#10213E" flood-opacity="0.12"/></filter><style>.title{font:800 32px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}.sub{font:500 16px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.h{font:800 19px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}.p{font:500 14px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.tpl{font:700 14px Consolas,Monaco,monospace;fill:#625D9C}.n{font:800 18px Arial,sans-serif;fill:#fff}</style></defs>
  <rect width="960" height="760" rx="30" fill="url(#bg)"/>
  <text x="52" y="60" class="title">EARS 的 5 类基础句式</text><text x="52" y="92" class="sub">不是把所有需求写成长句，而是先判断需求类型，再套合适模板</text>
  <g filter="url(#shadow)">
    <rect x="54" y="128" width="852" height="96" rx="22" fill="#fff"/><circle cx="94" cy="166" r="21" fill="url(#g)"/><text x="94" y="173" text-anchor="middle" class="n">1</text><text x="132" y="158" class="h">普遍型 Ubiquitous</text><text x="132" y="184" class="tpl">The &lt;system&gt; shall &lt;response&gt;.</text><text x="132" y="207" class="p">只要系统存在就一直成立的基础能力或约束。</text>
    <rect x="54" y="248" width="852" height="96" rx="22" fill="#fff"/><circle cx="94" cy="286" r="21" fill="url(#g)"/><text x="94" y="293" text-anchor="middle" class="n">2</text><text x="132" y="278" class="h">事件型 Event-driven</text><text x="132" y="304" class="tpl">When &lt;trigger&gt;, the &lt;system&gt; shall &lt;response&gt;.</text><text x="132" y="327" class="p">某个事件发生时，系统必须产生响应。</text>
    <rect x="54" y="368" width="852" height="96" rx="22" fill="#fff"/><circle cx="94" cy="406" r="21" fill="url(#g)"/><text x="94" y="413" text-anchor="middle" class="n">3</text><text x="132" y="398" class="h">状态型 State-driven</text><text x="132" y="424" class="tpl">While &lt;state&gt;, the &lt;system&gt; shall &lt;response&gt;.</text><text x="132" y="447" class="p">系统处在某种状态期间，必须持续满足的行为或限制。</text>
    <rect x="54" y="488" width="852" height="96" rx="22" fill="#fff"/><circle cx="94" cy="526" r="21" fill="url(#g)"/><text x="94" y="533" text-anchor="middle" class="n">4</text><text x="132" y="518" class="h">异常型 / 非期望型 Unwanted behavior</text><text x="132" y="544" class="tpl">If &lt;unwanted condition&gt;, then the &lt;system&gt; shall &lt;response&gt;.</text><text x="132" y="567" class="p">出现错误、异常、非法输入、失败条件时，系统如何处理。</text>
    <rect x="54" y="608" width="852" height="96" rx="22" fill="#fff"/><circle cx="94" cy="646" r="21" fill="url(#g)"/><text x="94" y="653" text-anchor="middle" class="n">5</text><text x="132" y="638" class="h">可选特性型 Optional feature</text><text x="132" y="664" class="tpl">Where &lt;feature&gt;, the &lt;system&gt; shall &lt;response&gt;.</text><text x="132" y="687" class="p">只在某个模块、版本、配置或授权特性存在时成立。</text>
  </g>
</svg>
