<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#EEF7FF"/></linearGradient><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5DB2E2"/><stop offset="1" stop-color="#625D9C"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#5DB2E2"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#10213E" flood-opacity="0.13"/></filter><style>.title{font:800 32px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}.sub{font:500 16px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.h{font:800 18px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}.p{font:500 13px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.n{font:800 18px Arial,sans-serif;fill:#fff}.line{stroke:#5DB2E2;stroke-width:3;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="960" height="560" rx="30" fill="url(#bg)"/>
  <text x="50" y="60" class="title">EARS 落地流程：从一句口头需求到可验收需求</text><text x="50" y="92" class="sub">先澄清，再分类，再套句式，再补约束，最后变成验收用例</text>
  <g filter="url(#shadow)">
    <rect x="48" y="188" width="138" height="118" rx="20" fill="#fff"/><circle cx="84" cy="226" r="19" fill="url(#g)"/><text x="84" y="233" text-anchor="middle" class="n">1</text><text x="112" y="220" class="h">收集原话</text><text x="72" y="258" class="p">业务表达</text><text x="72" y="280" class="p">用户故事</text>
    <rect x="228" y="188" width="138" height="118" rx="20" fill="#fff"/><circle cx="264" cy="226" r="19" fill="url(#g)"/><text x="264" y="233" text-anchor="middle" class="n">2</text><text x="292" y="220" class="h">澄清要素</text><text x="252" y="258" class="p">触发 / 状态</text><text x="252" y="280" class="p">主体 / 结果</text>
    <rect x="408" y="188" width="138" height="118" rx="20" fill="#fff"/><circle cx="444" cy="226" r="19" fill="url(#g)"/><text x="444" y="233" text-anchor="middle" class="n">3</text><text x="472" y="220" class="h">选择模板</text><text x="432" y="258" class="p">When / If</text><text x="432" y="280" class="p">While / Where</text>
    <rect x="588" y="188" width="138" height="118" rx="20" fill="#fff"/><circle cx="624" cy="226" r="19" fill="url(#g)"/><text x="624" y="233" text-anchor="middle" class="n">4</text><text x="652" y="220" class="h">补充质量</text><text x="612" y="258" class="p">性能 / 安全</text><text x="612" y="280" class="p">权限 / 数据</text>
    <rect x="768" y="188" width="144" height="118" rx="20" fill="#fff"/><circle cx="804" cy="226" r="19" fill="url(#g)"/><text x="804" y="233" text-anchor="middle" class="n">5</text><text x="832" y="220" class="h">验收检查</text><text x="792" y="258" class="p">可测试</text><text x="792" y="280" class="p">无歧义</text>
  </g>
  <path class="line" d="M186 247 H224"/><path class="line" d="M366 247 H404"/><path class="line" d="M546 247 H584"/><path class="line" d="M726 247 H764"/>
  <rect x="114" y="398" width="732" height="72" rx="20" fill="#fff" filter="url(#shadow)"/><text x="480" y="428" text-anchor="middle" style="font:800 20px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#625D9C">最终产物：标准化需求 + 验收用例 + 未决问题清单 + 追踪编号</text><text x="480" y="455" text-anchor="middle" class="p">大白话：先把“想法”变成“句子”，再把“句子”变成“能测的承诺”。</text>
</svg>
