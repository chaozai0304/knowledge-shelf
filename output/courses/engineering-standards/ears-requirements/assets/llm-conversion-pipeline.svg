<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F0F9FF"/></linearGradient><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0EA5E9"/><stop offset="1" stop-color="#7C3AED"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7C3AED"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10213E" flood-opacity="0.12"/></filter><style>.title{font:800 32px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}.sub{font:500 16px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.h{font:800 18px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}.p{font:500 13px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.tag{font:800 13px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#fff}.line{stroke:#7C3AED;stroke-width:3;fill:none;marker-end:url(#arrow);opacity:.75}</style></defs>
  <rect width="960" height="620" rx="30" fill="url(#bg)"/>
  <text x="48" y="60" class="title">借助大模型把原始需求转成 EARS：推荐流水线</text><text x="48" y="92" class="sub">大模型负责整理和发现问题，人负责确认业务事实和最终签收</text>
  <g filter="url(#shadow)">
    <rect x="52" y="138" width="244" height="118" rx="20" fill="#fff"/><rect x="76" y="160" width="78" height="26" rx="13" fill="url(#g)"/><text x="115" y="178" text-anchor="middle" class="tag">输入</text><text x="76" y="210" class="h">原始材料</text><text x="76" y="238" class="p">会议纪要、用户故事、PRD、工单、聊天记录</text>
    <rect x="358" y="138" width="244" height="118" rx="20" fill="#fff"/><rect x="382" y="160" width="78" height="26" rx="13" fill="url(#g)"/><text x="421" y="178" text-anchor="middle" class="tag">抽取</text><text x="382" y="210" class="h">识别需求要素</text><text x="382" y="238" class="p">主体、触发、状态、异常、结果、约束</text>
    <rect x="664" y="138" width="244" height="118" rx="20" fill="#fff"/><rect x="688" y="160" width="78" height="26" rx="13" fill="url(#g)"/><text x="727" y="178" text-anchor="middle" class="tag">转换</text><text x="688" y="210" class="h">生成 EARS 草案</text><text x="688" y="238" class="p">按类型套模板，保留未决问题</text>
    <rect x="204" y="354" width="244" height="118" rx="20" fill="#fff"/><rect x="228" y="376" width="78" height="26" rx="13" fill="url(#g)"/><text x="267" y="394" text-anchor="middle" class="tag">评审</text><text x="228" y="426" class="h">质量检查</text><text x="228" y="454" class="p">原子性、可验证性、歧义、冲突、漏项</text>
    <rect x="512" y="354" width="244" height="118" rx="20" fill="#fff"/><rect x="536" y="376" width="78" height="26" rx="13" fill="url(#g)"/><text x="575" y="394" text-anchor="middle" class="tag">输出</text><text x="536" y="426" class="h">需求包</text><text x="536" y="454" class="p">EARS 需求、验收用例、问题清单、追踪矩阵</text>
  </g>
  <path class="line" d="M296 197 H354"/><path class="line" d="M602 197 H660"/><path class="line" d="M790 260 C790 326 716 340 642 354"/><path class="line" d="M512 413 H452"/>
  <text x="480" y="548" text-anchor="middle" style="font:800 21px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#625D9C">关键原则：AI 生成草案，人确认事实；AI 找问题，人做决策。</text>
</svg>
