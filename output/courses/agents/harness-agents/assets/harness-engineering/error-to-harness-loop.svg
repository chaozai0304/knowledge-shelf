<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#EEF7FF"/></linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5DB2E2"/><stop offset="1" stop-color="#625D9C"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#5DB2E2"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#10213E" flood-opacity="0.13"/></filter>
    <style>.title{font:800 30px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}.sub{font:500 15px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.h{font:800 18px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}.p{font:500 13px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.num{font:800 18px Arial,sans-serif;fill:#fff}.line{stroke:#5DB2E2;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="900" height="520" rx="30" fill="url(#bg)"/>
  <text x="46" y="58" class="title">从一次错误，到一条 Harness</text>
  <text x="46" y="88" class="sub">驾驭工程的关键动作：不要只修结果，要把错误变成系统能力</text>
  <g filter="url(#shadow)">
    <rect x="54" y="178" width="150" height="112" rx="20" fill="#fff"/><circle cx="88" cy="214" r="18" fill="url(#g)"/><text x="88" y="221" text-anchor="middle" class="num">1</text><text x="126" y="210" class="h">发现错误</text><text x="78" y="248" class="p">跑错命令</text><text x="78" y="271" class="p">漏跑测试</text>
    <rect x="250" y="178" width="150" height="112" rx="20" fill="#fff"/><circle cx="284" cy="214" r="18" fill="url(#g)"/><text x="284" y="221" text-anchor="middle" class="num">2</text><text x="322" y="210" class="h">定位原因</text><text x="274" y="248" class="p">缺说明？</text><text x="274" y="271" class="p">缺工具？</text>
    <rect x="446" y="178" width="150" height="112" rx="20" fill="#fff"/><circle cx="480" cy="214" r="18" fill="url(#g)"/><text x="480" y="221" text-anchor="middle" class="num">3</text><text x="518" y="210" class="h">补机制</text><text x="470" y="248" class="p">写 AGENTS.md</text><text x="470" y="271" class="p">加验证脚本</text>
    <rect x="642" y="178" width="204" height="112" rx="20" fill="#fff"/><circle cx="676" cy="214" r="18" fill="url(#g)"/><text x="676" y="221" text-anchor="middle" class="num">4</text><text x="714" y="210" class="h">下次自动受益</text><text x="666" y="248" class="p">Agent 少走弯路</text><text x="666" y="271" class="p">人少做重复提醒</text>
  </g>
  <path class="line" d="M204 234 H246"/>
  <path class="line" d="M400 234 H442"/>
  <path class="line" d="M596 234 H638"/>
  <path class="line" d="M742 302 C722 404 238 404 158 306"/>
  <text x="450" y="430" text-anchor="middle" style="font:800 20px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#625D9C">每次复盘，不是为了证明 Agent 笨，而是为了让系统变聪明</text>
</svg>
