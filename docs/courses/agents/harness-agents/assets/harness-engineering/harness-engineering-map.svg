<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5DB2E2"/>
      <stop offset="100%" stop-color="#625D9C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#10213E" flood-opacity="0.16"/>
    </filter>
    <style>
      .title{font:800 30px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}
      .sub{font:500 16px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}
      .label{font:700 18px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}
      .small{font:500 13px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}
      .white{font:800 25px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#fff}
      .line{stroke:#5DB2E2;stroke-width:2.5;stroke-dasharray:7 7;fill:none;opacity:.8}
    </style>
  </defs>
  <rect width="900" height="520" rx="28" fill="url(#bg)"/>
  <text x="48" y="56" class="title">驾驭工程：不是让 Agent 更自由，而是让它更可靠</text>
  <text x="48" y="86" class="sub">围绕 AI Agent 搭建上下文、工具、验证、流程、权限和复盘机制</text>

  <circle cx="450" cy="278" r="88" fill="url(#core)" filter="url(#shadow)"/>
  <text x="450" y="270" text-anchor="middle" class="white">AI Agent</text>
  <text x="450" y="302" text-anchor="middle" style="font:600 15px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#EAF7FF">会理解、会调用工具、会行动</text>

  <path d="M450 190 C450 150 450 132 450 112" class="line"/>
  <path d="M528 238 C610 200 660 170 710 136" class="line"/>
  <path d="M532 320 C610 358 660 390 720 424" class="line"/>
  <path d="M368 320 C290 358 240 390 180 424" class="line"/>
  <path d="M372 238 C290 200 240 170 190 136" class="line"/>
  <path d="M450 366 C450 402 450 424 450 452" class="line"/>

  <g filter="url(#shadow)">
    <rect x="330" y="100" width="240" height="72" rx="18" fill="#FFFFFF"/>
    <text x="450" y="130" text-anchor="middle" class="label">目标与任务边界</text>
    <text x="450" y="154" text-anchor="middle" class="small">知道要做什么，也知道不做什么</text>

    <rect x="610" y="104" width="244" height="78" rx="18" fill="#FFFFFF"/>
    <text x="732" y="136" text-anchor="middle" class="label">上下文与知识</text>
    <text x="732" y="160" text-anchor="middle" class="small">项目结构、规则、历史和依赖关系</text>

    <rect x="618" y="384" width="236" height="78" rx="18" fill="#FFFFFF"/>
    <text x="736" y="416" text-anchor="middle" class="label">工具与执行能力</text>
    <text x="736" y="440" text-anchor="middle" class="small">读文件、跑测试、截图、查日志</text>

    <rect x="330" y="430" width="240" height="72" rx="18" fill="#FFFFFF"/>
    <text x="450" y="460" text-anchor="middle" class="label">验证与反馈闭环</text>
    <text x="450" y="484" text-anchor="middle" class="small">快速知道对错，失败后能自我修正</text>

    <rect x="46" y="384" width="236" height="78" rx="18" fill="#FFFFFF"/>
    <text x="164" y="416" text-anchor="middle" class="label">权限与治理</text>
    <text x="164" y="440" text-anchor="middle" class="small">能干活，但不能乱动</text>

    <rect x="46" y="104" width="244" height="78" rx="18" fill="#FFFFFF"/>
    <text x="168" y="136" text-anchor="middle" class="label">经验沉淀</text>
    <text x="168" y="160" text-anchor="middle" class="small">把犯过的错变成下次不会犯的机制</text>
  </g>
</svg>
