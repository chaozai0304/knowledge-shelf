<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FBFF"/><stop offset="1" stop-color="#F7F0FF"/></linearGradient><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5DB2E2"/><stop offset="1" stop-color="#625D9C"/></linearGradient><filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#10213E" flood-opacity="0.12"/></filter><style>.title{font:800 32px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}.sub{font:500 16px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.h{font:800 19px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#10213E}.p{font:500 14px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.check{font:900 22px Arial,sans-serif;fill:#fff}</style></defs>
  <rect width="960" height="620" rx="30" fill="url(#bg)"/>
  <text x="52" y="60" class="title">EARS 需求质量门：写完以后怎么判断合格？</text><text x="52" y="92" class="sub">一个需求不是套了句式就合格，还要能被理解、开发、测试和追踪</text>
  <g filter="url(#shadow)">
    <rect x="74" y="136" width="376" height="86" rx="20" fill="#fff"/><circle cx="112" cy="174" r="20" fill="url(#g)"/><text x="112" y="182" text-anchor="middle" class="check">✓</text><text x="148" y="168" class="h">原子性</text><text x="148" y="194" class="p">一句需求只表达一个可独立验证的行为</text>
    <rect x="510" y="136" width="376" height="86" rx="20" fill="#fff"/><circle cx="548" cy="174" r="20" fill="url(#g)"/><text x="548" y="182" text-anchor="middle" class="check">✓</text><text x="584" y="168" class="h">明确性</text><text x="584" y="194" class="p">主体、触发、状态、响应都清楚</text>
    <rect x="74" y="252" width="376" height="86" rx="20" fill="#fff"/><circle cx="112" cy="290" r="20" fill="url(#g)"/><text x="112" y="298" text-anchor="middle" class="check">✓</text><text x="148" y="284" class="h">可验证性</text><text x="148" y="310" class="p">测试人员知道如何判断通过或失败</text>
    <rect x="510" y="252" width="376" height="86" rx="20" fill="#fff"/><circle cx="548" cy="290" r="20" fill="url(#g)"/><text x="548" y="298" text-anchor="middle" class="check">✓</text><text x="584" y="284" class="h">必要性</text><text x="584" y="310" class="p">能追溯到业务目标、风险或法规要求</text>
    <rect x="74" y="368" width="376" height="86" rx="20" fill="#fff"/><circle cx="112" cy="406" r="20" fill="url(#g)"/><text x="112" y="414" text-anchor="middle" class="check">✓</text><text x="148" y="400" class="h">一致性</text><text x="148" y="426" class="p">不和其他需求、流程、权限、数据定义冲突</text>
    <rect x="510" y="368" width="376" height="86" rx="20" fill="#fff"/><circle cx="548" cy="406" r="20" fill="url(#g)"/><text x="548" y="414" text-anchor="middle" class="check">✓</text><text x="584" y="400" class="h">完整性</text><text x="584" y="426" class="p">正常、异常、边界、权限、状态都被覆盖</text>
  </g>
  <rect x="190" y="506" width="580" height="70" rx="22" fill="#fff" filter="url(#shadow)"/><text x="480" y="536" text-anchor="middle" style="font:800 20px 'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#625D9C">一句话：能不能开发？能不能测试？能不能追踪？会不会误解？</text><text x="480" y="562" text-anchor="middle" class="p">四个问题都答得清楚，需求才算真正过关。</text>
</svg>
